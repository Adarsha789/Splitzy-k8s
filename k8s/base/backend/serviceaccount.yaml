apiVersion: v1
kind: ServiceAccount
metadata:
  name: splitzy-backend
  # In the aks-prod overlay this gets one extra annotation:
  #   azure.workload.identity/client-id: <MANAGED_IDENTITY_CLIENT_ID>
  # That annotation is what tells the Secrets Store CSI driver (and any
  # Azure SDK call inside the pod) which managed identity to use — no static
  # credentials needed anywhere.
automountServiceAccountToken: true
