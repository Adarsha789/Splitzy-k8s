apiVersion: apps/v1
kind: Deployment
metadata:
  name: splitzy-backend
  labels:
    app.kubernetes.io/name: splitzy-backend
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: splitzy-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: splitzy-backend
        app.kubernetes.io/component: backend
    spec:
      # Spread replicas across nodes so a single node failure can't take the
      # whole backend down.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: splitzy-backend
      serviceAccountName: splitzy-backend
      containers:
        - name: backend
          image: splitzy-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["/start"]
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: splitzy-config
            - secretRef:
                name: splitzy-secrets
          # Liveness: cheap, never hits the DB -> a DB blip won't kill all pods.
          # Host: localhost is always in Django's ALLOWED_HOSTS, so the probe
          # passes the host check regardless of the pod IP or environment.
          livenessProbe:
            httpGet:
              path: /healthz/
              port: http
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          # Readiness: checks the DB -> pod leaves the Service until DB is reachable.
          readinessProbe:
            httpGet:
              path: /readyz/
              port: http
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # Startup: give the app time to boot before liveness kicks in.
          startupProbe:
            httpGet:
              path: /healthz/
              port: http
              httpHeaders:
                - name: Host
                  value: localhost
            periodSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
