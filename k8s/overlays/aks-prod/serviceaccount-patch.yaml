# Annotate the backend ServiceAccount with the managed identity client ID.
# This is what Azure Workload Identity uses to know WHICH managed identity
# the pod should impersonate when calling Key Vault / Azure Blob / etc.
#
# The CSI driver sees this annotation, fetches a token for that identity,
# and uses it to pull secrets from Key Vault — zero static credentials.
#
# REPLACE <MANAGED_IDENTITY_CLIENT_ID> with the clientId you captured in
# Phase 2 of the README (IDENTITY_CLIENT_ID variable).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: splitzy-backend
  annotations:
    azure.workload.identity/client-id: "<MANAGED_IDENTITY_CLIENT_ID>"
  labels:
    azure.workload.identity/use: "true"
