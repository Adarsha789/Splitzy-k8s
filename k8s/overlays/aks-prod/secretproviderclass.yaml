# Pulls secrets from Azure Key Vault using the Secrets Store CSI driver and
# syncs them into a Kubernetes Secret named "splitzy-secrets" that the backend
# Deployment and migrate Job consume via envFrom.
#
# Prereqs (see k8s/README.md):
#   - AKS add-on enabled: az aks enable-addons --addons azure-keyvault-secrets-provider
#   - Workload identity / user-assigned identity with "get" access to the vault
#   - REPLACE: <KEYVAULT_NAME>, <CLIENT_ID> (of the identity), <TENANT_ID>
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: splitzy-kv
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "<CLIENT_ID>"
    keyvaultName: "<KEYVAULT_NAME>"
    tenantId: "<TENANT_ID>"
    objects: |
      array:
        - |
          objectName: django-secret-key
          objectType: secret
        - |
          objectName: postgres-user
          objectType: secret
        - |
          objectName: postgres-password
          objectType: secret
        - |
          objectName: email-host-user
          objectType: secret
        - |
          objectName: email-host-password
          objectType: secret
        - |
          objectName: azure-account-key
          objectType: secret
  # Mirror the Key Vault secrets into a K8s Secret with the env-var key names the
  # app expects.
  secretObjects:
    - secretName: splitzy-secrets
      type: Opaque
      data:
        - objectName: django-secret-key
          key: DJANGO_SECRET_KEY
        - objectName: postgres-user
          key: POSTGRES_USER
        - objectName: postgres-password
          key: POSTGRES_PASSWORD
        - objectName: email-host-user
          key: EMAIL_HOST_USER
        - objectName: email-host-password
          key: EMAIL_HOST_PASSWORD
        - objectName: azure-account-key
          key: AZURE_ACCOUNT_KEY
