# In-cluster PostgreSQL for LOCAL development only (minikube).
# Production (aks-prod overlay) uses Azure Database for PostgreSQL Flexible Server.
apiVersion: v1
kind: Service
metadata:
  name: splitzy-postgres
  labels:
    app.kubernetes.io/name: splitzy-postgres
spec:
  # Headless service -> stable DNS for the StatefulSet pod.
  clusterIP: None
  selector:
    app.kubernetes.io/name: splitzy-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: splitzy-postgres
  labels:
    app.kubernetes.io/name: splitzy-postgres
spec:
  serviceName: splitzy-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: splitzy-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: splitzy-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15.0-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: splitzy-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: splitzy-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: splitzy-secrets
                  key: POSTGRES_PASSWORD
            # Postgres needs a subdir, not the volume mount root.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
