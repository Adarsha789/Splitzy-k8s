server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Container health endpoint for Kubernetes probes.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Long-cache hashed build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Serve the React SPA; unknown paths fall back to index.html for client routing.
    location / {
        try_files $uri /index.html;
    }

    # NOTE: /api, /static and /media are routed to the Django backend by the
    # Kubernetes Ingress, not by this Nginx. In Kubernetes this container only
    # serves the built frontend.
}
